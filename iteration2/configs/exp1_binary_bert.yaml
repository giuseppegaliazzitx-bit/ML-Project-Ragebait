experiment:
  iteration: "Iteration 2"
  name: "exp1_binary_bert"
  description: "Experiment 1 Tier 3 fine-tuning with bert-base-uncased."

paths:
  processed_dir: "data/processed"
  train_split: "data/processed/binary_train.csv"
  val_split: "data/processed/binary_val.csv"
  test_split: "data/processed/binary_test.csv"
  baseline_summary: "outputs/exp1_binary_baselines/summary.json"
  output_dir: "outputs/exp1_binary_bert"
  checkpoint_path: "outputs/exp1_binary_bert/checkpoints/best_model.pt"
  tokenizer_dir: "outputs/exp1_binary_bert/tokenizer"

dataset:
  text_column: "text"
  label_column: "binary_label"

model:
  pretrained_name: "bert-base-uncased"
  local_files_only: false
  use_fast: true
  num_labels: 2
  max_length: 128
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1

training:
  seed: 42
  train_batch_size: 32
  eval_batch_size: 64
  epochs: 3
  learning_rate: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  adam_epsilon: 0.00000001
  use_amp: true
  num_workers: 0
