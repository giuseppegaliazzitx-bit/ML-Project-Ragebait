experiment:
  iteration: "Iteration 2"
  name: "exp2_multiclass_baselines"
  description: "Experiment 2 multiclass baselines trained from scratch on trolldata.csv."

task:
  type: "multiclass"

paths:
  raw_data: "data/raw/trolldata.csv"
  processed_dir: "data/processed"
  train_split: "data/processed/multiclass_train.csv"
  val_split: "data/processed/multiclass_val.csv"
  test_split: "data/processed/multiclass_test.csv"
  split_manifest_path: "data/processed/multiclass_split_manifest.json"
  label_map_path: "data/processed/multiclass_label_map.json"
  class_weights_path: "outputs/exp2_multiclass_baselines/class_weights.json"
  output_dir: "outputs/exp2_multiclass_baselines"

dataset:
  text_column: "text"
  label_column: "label"
  target_column: "multiclass_label"
  target_name_column: "multiclass_label_name"
  label_order:
    - "Normal"
    - "Profanity"
    - "Trolling"
    - "Derogatory"
    - "Hate Speech"
  stratify_column: "label"
  split:
    train_size: 0.8
    val_size: 0.1
    test_size: 0.1
    seed: 42

preprocessing:
  tfidf:
    max_features: 20000
    ngram_range: [1, 2]
    min_df: 2
    max_df: 0.95
    sublinear_tf: true
  sequence:
    lowercase: true
    min_freq: 2
    max_vocab_size: 20000
    max_length: 64

models:
  logistic_regression:
    c: 1.0
    max_iter: 2000
    solver: "lbfgs"
    multi_class: "multinomial"
  linear_svc:
    c: 1.0
  ffnn:
    embedding_dim: 128
    hidden_dims: [128, 64]
    dropout: 0.30

training:
  seed: 42
  batch_size: 64
  epochs: 25
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 5
  device: "auto"
