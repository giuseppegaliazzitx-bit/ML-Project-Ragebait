paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  unlabeled_dir: data/unlabeled
  labeled_dir: data/labeled
  output_dir: outputs
  unified_posts_path: data/interim/unified_posts.csv
  source_manifest_path: data/interim/source_manifest.json
  annotation_template_path: data/interim/annotation_template.csv
  labeled_posts_path: data/interim/labeled_posts.csv
  processed_dataset_path: data/processed/processed_posts.csv
  unlabeled_posts_path: data/unlabeled/unified_unlabeled_posts.csv
  vllm_labels_path: data/labeled/vllm_ragebait_labels.csv

data:
  min_posts: 20000
  supported_languages:
    - en
  drop_non_english: true
  min_text_length: 3
  augment_minority_class: true
  augmentation_copies: 1
  test_size: 0.10
  validation_size: 0.10
  max_baseline_features: 20000

baselines:
  enabled: true
  max_features: 20000
  ngram_range: [1, 2]

model:
  model_name: bert-base-uncased
  hidden_dim: 256
  dropout: 0.2
  max_length: 256
  stride: 96

training:
  batch_size: 16
  epochs: 5
  learning_rate: 0.00002
  weight_decay: 0.01
  patience: 2
  min_delta: 0.001
  num_workers: 0
  decision_threshold: 0.5
  seed: 42
  device: auto

vllm:
  model: Qwen/Qwen2.5-3B-Instruct-AWQ
  quantization: awq
  gpu_memory_utilization: 0.85
  max_model_len: 1024
  temperature: 0.0
  limit: null
  random_seed: 42
  enable_random: true
