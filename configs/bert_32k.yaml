paths:
  labeled_posts_path: data/labeled/balanced_32000_c95_r60_40.csv
  processed_dataset_path: data/processed/processed_32000_c95_r60_40.csv
  manual_eval_path: data/labeled/manual_eval.csv
  output_dir: outputs/bert_32k

data:
  supported_languages:
    - en
  drop_non_english: true
  min_text_length: 3
  augment_minority_class: false
  augmentation_copies: 0
  test_size: 0.10
  validation_size: 0.10

baselines:
  enabled: true
  max_features: 20000
  ngram_range: [1, 2]

model:
  model_name: bert-base-uncased
  tokenizer_name:
  hidden_dim: 128
  dropout: 0.2
  max_length: 128
  stride: 48

training:
  batch_size: 8
  epochs: 1
  learning_rate: 0.00003
  weight_decay: 0.01
  patience: 1
  min_delta: 0.001
  num_workers: 0
  decision_threshold: 0.5
  seed: 42
  device: auto
